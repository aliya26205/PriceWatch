<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceWatch Dashboard</title>

    <style>
:root{
  --coral: #F0654A;
  --apricot: #F7A35C;
  --cream: #FFF9F4;
  --ink: #2A2330;
  --ink-soft: #8A8190;
  --line: #F0E6DD;
  --shadow: 0 30px 60px -20px rgba(208, 88, 53, 0.35);
}

*{ box-sizing: border-box; }

html, body{
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
  background: var(--cream);
  overflow-x: hidden;
}

/* Centered card + gradient backdrop: only applies to pages that
   actually contain a .container card (login, register). The
   dashboard has no .container, so it keeps normal block layout. */
body:has(.container){
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background: linear-gradient(135deg, var(--coral) 0%, var(--coral) 45%, var(--apricot) 55%, var(--apricot) 100%);
}

/* ---------- Brand mark, fixed top-left (auth pages only) ---------- */
body:has(.container)::before{
  content: "🏷️ PriceWatch";
  position: fixed;
  top: 30px;
  left: 40px;
  font-weight: 700;
  font-size: 20px;
  color: #fff;
  letter-spacing: -0.2px;
  z-index: 5;
}

@keyframes float-drop{
  0%   { transform: translateY(-14px) rotate(-6deg); }
  50%  { transform: translateY(10px) rotate(4deg); }
  100% { transform: translateY(-14px) rotate(-6deg); }
}

@keyframes spin-coin{
  0%   { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

@keyframes pulse-tag{
  0%, 100% { transform: scale(1) rotate(8deg); }
  50%      { transform: scale(1.12) rotate(8deg); }
}

@keyframes scooter-ride{
  0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }
  25%      { transform: translateX(-8px) translateY(-4px) rotate(-2deg); }
  50%      { transform: translateX(0) translateY(-10px) rotate(0deg); }
  75%      { transform: translateX(8px) translateY(-4px) rotate(2deg); }
}

@keyframes bag-swing{
  0%, 100% { transform: rotate(-6deg); }
  50%      { transform: rotate(6deg); }
}

/* ---- Top strip (auth pages only) ---- */
html:has(.container)::before{
  content: "🏷️";
  position: fixed;
  top: 8%;
  left: 6%;
  font-size: 32px;
  z-index: 2;
  pointer-events: none;
  animation: pulse-tag 2.6s ease-in-out infinite;
  filter: drop-shadow(0 12px 14px rgba(0,0,0,0.18));
}

html:has(.container)::after{
  content: "🪙";
  position: fixed;
  top: 6%;
  left: 27%;
  font-size: 30px;
  z-index: 2;
  pointer-events: none;
  animation: spin-coin 3.2s linear infinite, float-drop 4.8s ease-in-out infinite;
  filter: drop-shadow(0 12px 14px rgba(0,0,0,0.18));
}

.container::before{
  content: "🛍️";
  position: fixed;
  top: 7%;
  right: 27%;
  font-size: 38px;
  z-index: 2;
  pointer-events: none;
  animation: float-drop 5.5s ease-in-out infinite;
  filter: drop-shadow(0 12px 14px rgba(0,0,0,0.18));
}

.container::after{
  content: "⌚";
  position: fixed;
  top: 8%;
  right: 6%;
  font-size: 32px;
  z-index: 2;
  pointer-events: none;
  animation: float-drop 6.2s ease-in-out infinite 0.5s;
  filter: drop-shadow(0 12px 14px rgba(0,0,0,0.18));
}

#loginForm::before{
  content: "🛍️";
  position: fixed;
  bottom: 7%;
  right: 26%;
  font-size: 36px;
  z-index: 2;
  pointer-events: none;
  animation: float-drop 6s ease-in-out infinite 0.6s;
  filter: drop-shadow(0 12px 14px rgba(0,0,0,0.18));
}

#loginForm::after{
  content: "⌚";
  position: fixed;
  bottom: 8%;
  right: 6%;
  font-size: 30px;
  z-index: 2;
  pointer-events: none;
  animation: float-drop 5.8s ease-in-out infinite 0.9s;
  filter: drop-shadow(0 12px 14px rgba(0,0,0,0.18));
}

.container p::before{
  content: "🛵";
  position: fixed;
  left: 5%;
  bottom: 4%;
  font-size: 120px;
  z-index: 2;
  pointer-events: none;
  display: block;
  line-height: 1;
  filter: drop-shadow(0 18px 18px rgba(0,0,0,0.25));
  animation: scooter-ride 3.4s ease-in-out infinite;
}

.container p::after{
  content: "🛍️";
  position: fixed;
  left: 15%;
  bottom: 13%;
  font-size: 40px;
  z-index: 3;
  pointer-events: none;
  display: block;
  transform-origin: top center;
  filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
  animation: bag-swing 1.6s ease-in-out infinite;
}

.container h1{
  font-weight: 800;
  font-size: 26px;
  line-height: 1.25;
  margin: 0 0 6px;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.container h1::after{
  content: "Create your free account.";
  display: block;
  font-weight: 500;
  font-size: 14px;
  color: var(--ink-soft);
  margin-top: 8px;
  letter-spacing: 0;
}

#registerForm{
  margin-top: 26px;
  display: flex;
  flex-direction: column;
}

#registerForm label{
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
  display: inline-block;
}

#registerForm br{ display: none; }

#registerForm > div{ margin-bottom: 2px; }

#registerForm input{
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 18px;
  border: 1.5px solid var(--line);
  border-radius: 12px;
  font-size: 14px;
  background: var(--cream);
  color: var(--ink);
  outline: none;
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease;
}

#registerForm input::placeholder{
  color: #C9BFB6;
}

#registerForm input:focus{
  border-color: var(--coral);
  box-shadow: 0 0 0 4px rgba(240, 101, 74, 0.12);
  background: #fff;
  transform: translateY(-1px);
}

#registerForm button[type="submit"]{
  margin-top: 6px;
  padding: 15px 18px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--coral), #E2502F);
  color: #fff;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 0.2px;
  box-shadow: 0 14px 24px -10px rgba(224, 80, 47, 0.55);
  transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

#registerForm button[type="submit"]:hover{
  transform: translateY(-2px);
  box-shadow: 0 18px 30px -10px rgba(224, 80, 47, 0.6);
  filter: brightness(1.04);
}

#registerForm button[type="submit"]:active{
  transform: translateY(0px) scale(.99);
}

#registerForm::before{
  content: "🛍️";
  position: fixed;
  bottom: 7%;
  right: 26%;
  font-size: 36px;
  z-index: 2;
  pointer-events: none;
  animation: float-drop 6s ease-in-out infinite 0.6s;
  filter: drop-shadow(0 12px 14px rgba(0,0,0,0.18));
}

#registerForm::after{
  content: "⌚";
  position: fixed;
  bottom: 8%;
  right: 6%;
  font-size: 30px;
  z-index: 2;
  pointer-events: none;
  animation: float-drop 5.8s ease-in-out infinite 0.9s;
  filter: drop-shadow(0 12px 14px rgba(0,0,0,0.18));
}

.container{
  position: relative;
  z-index: 10;
  width: 460px;
  max-width: 92vw;
  background: #fff;
  border-radius: 22px;
  padding: 48px 44px 38px;
  box-shadow: var(--shadow);
  margin-top: 0;
  animation: card-in 0.65s ease-out both;
}

@keyframes card-in{
  from{ opacity: 0; margin-top: 26px; }
  to{ opacity: 1; margin-top: 0; }
}

.container h2{
  font-weight: 800;
  font-size: 26px;
  line-height: 1.25;
  margin: 0 0 6px;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.container h2::after{
  content: "Track prices, shop smarter.";
  display: block;
  font-weight: 500;
  font-size: 14px;
  color: var(--ink-soft);
  margin-top: 8px;
  letter-spacing: 0;
}

#loginForm{
  margin-top: 26px;
  display: flex;
  flex-direction: column;
}

#loginForm label{
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
  display: inline-block;
}

#loginForm br{ display: none; }

#loginForm input{
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 18px;
  border: 1.5px solid var(--line);
  border-radius: 12px;
  font-size: 14px;
  background: var(--cream);
  color: var(--ink);
  outline: none;
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease;
}

#loginForm input::placeholder{
  color: #C9BFB6;
}

#loginForm input:focus{
  border-color: var(--coral);
  box-shadow: 0 0 0 4px rgba(240, 101, 74, 0.12);
  background: #fff;
  transform: translateY(-1px);
}

#loginForm button[type="submit"]{
  margin-top: 6px;
  padding: 15px 18px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--coral), #E2502F);
  color: #fff;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 0.2px;
  box-shadow: 0 14px 24px -10px rgba(224, 80, 47, 0.55);
  transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

#loginForm button[type="submit"]:hover{
  transform: translateY(-2px);
  box-shadow: 0 18px 30px -10px rgba(224, 80, 47, 0.6);
  filter: brightness(1.04);
}

#loginForm button[type="submit"]:active{
  transform: translateY(0px) scale(.99);
}

.container p{
  text-align: center;
  font-size: 13.5px;
  color: var(--ink-soft);
  margin: 22px 0 0;
}

.container p a{
  color: var(--coral);
  font-weight: 600;
  text-decoration: none;
}

.container p a:hover{
  text-decoration: underline;
}

@media (max-width: 900px){
  html:has(.container)::before, html:has(.container)::after,
  .container::before, .container::after,
  #loginForm::before, #loginForm::after,
  #registerForm::before, #registerForm::after,
  .container p::before, .container p::after{
    display: none;
  }
}

@media (max-width: 560px){
  .container{
    padding: 38px 26px 30px;
  }
  body:has(.container)::before{
    left: 24px;
    top: 20px;
    font-size: 17px;
  }
}

@media (prefers-reduced-motion: reduce){
  html:has(.container)::before, html:has(.container)::after,
  .container::before, .container::after,
  #loginForm::before, #loginForm::after,
  #registerForm::before, #registerForm::after,
  .container p::before, .container p::after,
  .container{
    animation: none !important;
  }
}

/* =========================================================
   DASHBOARD (index.html) — header, summary cards, table.
   ========================================================= */

body:not(:has(.container)){
  background: var(--cream);
}

header{
  background: #fff;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 14px rgba(208, 88, 53, 0.08);
  position: sticky;
  top: 0;
  z-index: 20;
}

header h1{
  font-weight: 800;
  font-size: 19px;
  margin: 0;
  color: var(--ink);
  letter-spacing: -0.2px;
}

header h1::before{
  content: "🏷️ ";
}

header button{
  border: 1.5px solid var(--coral);
  background: transparent;
  color: var(--coral);
  font-weight: 600;
  font-size: 13.5px;
  padding: 9px 18px;
  border-radius: 10px;
  cursor: pointer;
  transition: background .18s ease, color .18s ease, transform .15s ease;
}

header button:hover{
  background: var(--coral);
  color: #fff;
  transform: translateY(-1px);
}

body:not(:has(.container)) hr{
  border: none;
  border-top: 1px solid var(--line);
  margin: 0;
}

body:not(:has(.container)) section{
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 32px;
  animation: dash-fade-in 0.5s ease-out both;
}

@keyframes dash-fade-in{
  from{ opacity: 0; margin-top: 8px; }
  to{ opacity: 1; margin-top: 0; }
}

body:not(:has(.container)) section h2{
  font-weight: 700;
  font-size: 18px;
  color: var(--ink);
  margin: 0 0 16px;
  letter-spacing: -0.2px;
}

#welcomeUser{
  font-size: 15px;
  color: var(--ink-soft);
  margin: 0;
}

section > div:has(#totalProducts){
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

section > div:has(#totalProducts) > p{
  background: #fff;
  margin: 0;
  padding: 18px 20px;
  border-radius: 14px;
  box-shadow: 0 10px 24px -14px rgba(208, 88, 53, 0.25);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
}

section > div:has(#totalProducts) > p span{
  display: block;
  font-size: 26px;
  font-weight: 800;
  margin-top: 6px;
  color: var(--ink);
}

#priceIncreased{ color: #E2502F; }
#priceDecreased{ color: #2E9D6F; }
#noChange{ color: var(--ink-soft); }

section > button{
  display: block;
  margin: 0 auto;
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--coral), #E2502F);
  color: #fff;
  font-weight: 600;
  font-size: 14.5px;
  cursor: pointer;
  box-shadow: 0 14px 24px -10px rgba(224, 80, 47, 0.5);
  transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

section > button:hover{
  transform: translateY(-2px);
  box-shadow: 0 18px 30px -10px rgba(224, 80, 47, 0.55);
  filter: brightness(1.04);
}

table{
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 24px -14px rgba(208, 88, 53, 0.2);
  border: none !important;
}

table th, table td{
  border: none !important;
  padding: 14px 16px !important;
  text-align: left;
  font-size: 13.5px;
}

table thead tr{
  background: linear-gradient(135deg, var(--coral), var(--apricot));
}

table thead th{
  color: #fff;
  font-weight: 600;
  font-size: 12.5px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

table tbody tr{
  border-bottom: 1px solid var(--line);
  transition: background .15s ease;
}

table tbody tr:last-child{
  border-bottom: none;
}

table tbody tr:hover{
  background: var(--cream);
}

#productsTable button{
  border: none;
  background: var(--coral);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  padding: 7px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 6px;
  transition: filter .15s ease;
}

#productsTable button:hover{
  filter: brightness(1.08);
}

#productsTable a{
  color: var(--coral);
  font-weight: 600;
  text-decoration: none;
  font-size: 12.5px;
}

@media (max-width: 760px){
  section > div:has(#totalProducts){
    grid-template-columns: repeat(2, 1fr);
  }
  table{
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }
}
    </style>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <!-- JavaScript Files -->
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/products.js"></script>
</head>

<body>

    <header>
        <h1>PriceWatch Dashboard</h1>

        <button onclick="logoutUser()">
            Logout
        </button>
    </header>

    <hr>

    <section>

        <h2>Welcome</h2>

        <p id="welcomeUser">
            Welcome User
        </p>

    </section>

    <hr>

    <section>

        <h2>Dashboard Summary</h2>

        <div>

            <p>
                Total Products :
                <span id="totalProducts">0</span>
            </p>

            <p>
                Price Increased :
                <span id="priceIncreased">0</span>
            </p>

            <p>
                Price Decreased :
                <span id="priceDecreased">0</span>
            </p>

            <p>
                No Change :
                <span id="noChange">0</span>
            </p>

        </div>

    </section>

    <hr>

    <section>

        <button onclick="window.location.href='add-product.html'">
            + Track New Product
        </button>

    </section>

    <hr>

    <section>

        <h2>My Tracked Products</h2>

        <table border="1" width="100%" cellpadding="10">

            <thead>

                <tr>

                    <th>Product Name</th>

                    <th>Website</th>

                    <th>Current Price</th>

                    <th>Previous Price</th>

                    <th>Price Change</th>

                    <th>Status</th>

                    <th>Last Checked</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="productsTable">

                <!-- Products will load here -->

            </tbody>

        </table>

    </section>

    <script>

        checkLogin();

        loadDashboard();

    </script>

</body>
</html>
